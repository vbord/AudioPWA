<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audiobook Player</title>

    <link rel="manifest" href="/ab/manifest.json">
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/AB/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/AB/icons/icon-512.png">
    <link rel="apple-touch-icon" href="/AB/icons/icon-192.png">

    <meta name="theme-color" content="#000000">
    <meta name="background-color" content="#000000">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css?ver=8">
</head>

<body>

    <!-- HEADER BAR -->
    <div id="header-bar">
        <div id="now-playing">Nothing playing</div>
        <button id="menu-btn">☰</button>
    </div>

    <!-- SIDE MENU -->
    <div id="side-menu">
        <button id="menu-close-btn">✖</button>

        <input id="tree-search" type="text" placeholder="Search…" />
        <button class="menu-item" id="search-go-btn">🔎 Search</button>
        <button class="menu-item" id="jump-now-btn">🎯 Now Playing</button>

        <div id="volume-row">
            <span class="vol-icon">🔊</span>
            <input id="volumeControl" type="range" min="0" max="1" step="0.01">
        </div>

        <button class="menu-item" id="refresh-tree-btn">🔄 Refresh</button>
        <button class="menu-item" id="logout-btn">🚪 Logout</button>
        <button class="menu-item" id="clear-site-btn">🧹 Clear Data</button>

        <div id="user-email" class="menu-email"></div>
    </div>

    <!-- PLAYER -->
    <div id="player-container">
        <audio id="player"></audio>

        <div id="custom-player">
            <div id="player-buttons">
                <button id="btn-back">⏪</button>

                <div id="play-wrapper">
                    <button id="btn-play">▶</button>
                    <div id="loading-overlay">Loading…</div>
                </div>

                <button id="btn-forward">⏩</button>
            </div>

            <div id="time-display">0:00 / 0:00</div>
            
            <div id="progress-bar">
                <div id="progress-fill"></div>
            </div>
        </div>
    </div>

    <!-- TREE -->
    <div id="tree-container"></div>

    <!-- LOGIN MODAL -->
    <div id="login-modal">
        <div id="login-box">
            <h2>Login</h2>
            <input id="login-email" type="email" placeholder="Enter email">
            <button id="login-btn">Login</button>
        </div>
    </div>

    <!-- DESCRIPTION MODAL -->
    <div id="desc-modal">
        <div id="desc-modal-content">
            <button id="desc-close-btn">✖</button>
            <pre id="desc-text"></pre>
        </div>
    </div>

    <script src="app.js?ver=9"></script>
    <script src="custom-player.js?ver=8"></script>
    <script src ="tree-search.js?ver=1"></script></script>
</body>
</html>
